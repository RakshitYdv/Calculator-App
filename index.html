<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d0d1a;
      font-family: 'DM Mono', monospace;
    }
    .calc {
      background: #1a1a2e;
      border-radius: 24px;
      padding: 28px;
      width: 320px;
    }
    .display {
      background: #0d0d1a;
      border-radius: 16px;
      padding: 20px 20px 12px;
      margin-bottom: 20px;
      min-height: 100px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }
    .expr {
      font-size: 13px;
      color: #6b6b9e;
      min-height: 18px;
      text-align: right;
      letter-spacing: 0.03em;
    }
    .result {
      font-size: 44px;
      font-weight: 500;
      color: #e8e8ff;
      text-align: right;
      letter-spacing: -1px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .btns {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }
    button {
      border: none;
      border-radius: 12px;
      font-family: 'DM Mono', monospace;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      padding: 0;
      height: 64px;
      transition: transform 0.08s, opacity 0.08s;
    }
    button:active { transform: scale(0.93); opacity: 0.85; }
    .btn-fn  { background: #2d2d52; color: #9b9bc7; font-size: 14px; }
    .btn-op  { background: #4f3af7; color: #fff; }
    .btn-num { background: #22223d; color: #e8e8ff; }
    .btn-zero { grid-column: span 2; }
    .btn-eq  { background: #a855f7; color: #fff; }
    .brand {
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.15em;
      color: #3a3a6e;
      text-align: center;
      margin-top: 18px;
    }
  </style>
</head>
<body>
  <div class="calc">
    <div class="display">
      <div class="expr" id="expr"></div>
      <div class="result" id="result">0</div>
    </div>
    <div class="btns">
      <button class="btn-fn" onclick="clearAll()">AC</button>
      <button class="btn-fn" onclick="toggleSign()">+/−</button>
      <button class="btn-fn" onclick="percent()">%</button>
      <button class="btn-op" onclick="setOp('/')">÷</button>

      <button class="btn-num" onclick="input('7')">7</button>
      <button class="btn-num" onclick="input('8')">8</button>
      <button class="btn-num" onclick="input('9')">9</button>
      <button class="btn-op" onclick="setOp('*')">×</button>

      <button class="btn-num" onclick="input('4')">4</button>
      <button class="btn-num" onclick="input('5')">5</button>
      <button class="btn-num" onclick="input('6')">6</button>
      <button class="btn-op" onclick="setOp('-')">−</button>

      <button class="btn-num" onclick="input('1')">1</button>
      <button class="btn-num" onclick="input('2')">2</button>
      <button class="btn-num" onclick="input('3')">3</button>
      <button class="btn-op" onclick="setOp('+')">+</button>

      <button class="btn-num btn-zero" onclick="input('0')">0</button>
      <button class="btn-num" onclick="inputDot()">.</button>
      <button class="btn-eq" onclick="calculate()">=</button>
    </div>
    <div class="brand">CALCULATOR</div>
  </div>

  <script>
    let cur = '0', prev = '', op = null, fresh = false;
    const R = document.getElementById('result');
    const E = document.getElementById('expr');
    const opSym = { '+': '+', '−': '-', '-': '−', '*': '×', '/': '÷' };

    function show(v) {
      let s = String(v);
      if (s.length > 12) { let n = parseFloat(v); s = n.toPrecision(8).replace(/\.?0+$/, ''); }
      R.textContent = s;
    }
    function input(d) {
      if (fresh) { cur = d; fresh = false; }
      else cur = cur === '0' ? d : cur + d;
      show(cur);
    }
    function inputDot() {
      if (fresh) { cur = '0.'; fresh = false; }
      else if (!cur.includes('.')) cur += '.';
      show(cur);
    }
    function clearAll() { cur = '0'; prev = ''; op = null; fresh = false; E.textContent = ''; show('0'); }
    function toggleSign() { cur = String(-parseFloat(cur)); show(cur); }
    function percent() { cur = String(parseFloat(cur) / 100); show(cur); }
    function setOp(o) {
      if (op && !fresh) calculate(true);
      prev = cur; op = o; fresh = true;
      E.textContent = prev + ' ' + (opSym[o] || o);
    }
    function calculate(chain) {
      if (!op || !prev) return;
      let a = parseFloat(prev), b = parseFloat(cur), res;
      const sym = opSym[op] || op;
      if (!chain) E.textContent = prev + ' ' + sym + ' ' + cur + ' =';
      if (op === '+') res = a + b;
      else if (op === '-') res = a - b;
      else if (op === '*') res = a * b;
      else if (op === '/') { res = b === 0 ? 'Error' : a / b; }
      cur = res === 'Error' ? '0' : String(res);
      show(res);
      op = null; prev = ''; fresh = true;
    }
    document.addEventListener('keydown', e => {
      if ('0123456789'.includes(e.key)) input(e.key);
      else if (e.key === '.') inputDot();
      else if (e.key === '+') setOp('+');
      else if (e.key === '-') setOp('-');
      else if (e.key === '*') setOp('*');
      else if (e.key === '/') { e.preventDefault(); setOp('/'); }
      else if (e.key === 'Enter' || e.key === '=') calculate();
      else if (e.key === 'Escape') clearAll();
      else if (e.key === 'Backspace') { cur = cur.length > 1 ? cur.slice(0, -1) : '0'; show(cur); }
    });
  </script>
</body>
</html>
